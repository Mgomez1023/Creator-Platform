services:
  postgres:
    image: postgres:16-alpine
    container_name: creator-intel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: creator_intel
      POSTGRES_USER: creator
      POSTGRES_PASSWORD: creator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creator -d creator_intel"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
